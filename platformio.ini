; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino

; Serial monitor
monitor_speed = 115200

; Library dependencies (pinned for reproducible builds)
lib_deps =
    Wire
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    chris--a/Keypad@^3.1.1
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0
    br3ttb/PID@^1.2.1

; Build flags for memory optimization (Arduino Nano constraints)
build_flags =
    -Os
    -flto
    -fno-exceptions
    -fno-rtti
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_EXCEPTIONS=0
    -mcall-prologues
    -w                           ; Suppress all warnings
    -I include                   ; Add project include directory to search path

; Our modules follow the spec pattern:
;   include/<module>.h (public API)
;   lib/<module>/<module>.cpp (implementation)
; PlatformIO's Library Dependency Finder won't compile these lib sources
; unless a library header is included from lib/. To keep the spec structure
; and still link, explicitly include all local module sources under lib/.
build_src_filter =
    +<*>
    +<../lib/*/*.cpp>

; Enforce Flash/SRAM limits via avr-size after linking
extra_scripts = pre:check_memory.py

; Upload settings
upload_speed = 115200
; NOTE: Do not hardcode upload_port; set it locally if needed, e.g.:
; upload_port = COM5
; upload_port = /dev/ttyUSB0
