[platformio]
default_envs = esp32

; PlatformIO Project Configuration File
; Hardware target: ESP32-WROOM-32 (DOIT ESP32 DEVKIT V1)
; Board: esp32doit-devkit-v1

[env:esp32]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

monitor_speed = 115200

; Library dependencies (pinned for reproducible builds)
lib_deps =
	Wire
	EEPROM
	marcoschwartz/LiquidCrystal_I2C@^1.1.4
	chris--a/Keypad@^3.1.1
	paulstoffregen/OneWire@^2.3.7
	milesburton/DallasTemperature@^3.11.0
	br3ttb/PID@^1.2.1

; Build flags:
; - ESP32 has sufficient Flash/SRAM headroom, so feature-splitting flags are not required.
; - Keep Serial prints controllable to reduce log noise.
build_flags =
	-Os
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
	-DENABLE_SERIAL_DEBUG=0

; Local modules follow the spec pattern:
;   include/<module>.h (public API)
;   lib/<module>/<module>.cpp (implementation)
build_src_filter =
	+<*>
	+<../lib/*/*.cpp>

; NOTE:
; - `check_memory.py` and Arduino Nano flash-limit enforcement are no longer used on ESP32.
; - Do not hardcode upload_port; set it locally if needed, e.g.:
    ; upload_port = COM5
;     upload_port = /dev/ttyUSB0
