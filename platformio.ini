; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = atmelavr
board = nanoatmega328
framework = arduino

; Serial monitor
monitor_speed = 115200

; Library dependencies (pinned for reproducible builds)
lib_deps =
    Wire
    EEPROM
    marcoschwartz/LiquidCrystal_I2C@^1.1.4
    chris--a/Keypad@^3.1.1
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.11.0
    br3ttb/PID@^1.2.1

; Build flags for memory optimization (Arduino Nano constraints)
build_flags =
    -Os
    -flto
    -fno-exceptions
    -fno-rtti
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -Wl,--relax
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_EXCEPTIONS=0
    -DENABLE_SERIAL_DEBUG=0
    -DSERIAL_RX_BUFFER_SIZE=32
    -DSERIAL_TX_BUFFER_SIZE=32
    -mcall-prologues
    -w

; Our modules follow the spec pattern:
;   include/<module>.h (public API)
;   lib/<module>/<module>.cpp (implementation)
; PlatformIO's Library Dependency Finder won't compile these lib sources
; unless a library header is included from lib/. To keep the spec structure
; and still link, explicitly include all local module sources under lib/.
build_src_filter =
    +<*>
    +<../lib/*/*.cpp>

; Enforce Flash/SRAM limits via avr-size after linking
extra_scripts = pre:check_memory.py

[env:nanoatmega328]
; Bench/service build (keeps service entry enabled, but compiles only the tools
; needed for the current phase to stay under Flash limits).
custom_size_profile = 1
build_flags =
    ${env.build_flags}
    -DENABLE_SERVICE_MENU=1
    -DENABLE_SERVICE_DRUM_TEST=0
    -DENABLE_SERVICE_HEATER_TEST=0
    -DENABLE_SERVICE_PID_VIEW=0
    -DENABLE_SERVICE_IO_TEST=0
    -DENABLE_SERVICE_FOPDT_ID=1
    -DENABLE_SERVICE_AUTOTUNE=0

[env:nano_operator]
; Operator/production build (service menu/tools compiled out).
custom_size_profile = 0
build_flags =
    ${env.build_flags}
    -DENABLE_SERVICE_MENU=0

[env:nano_autotune]
; Bench/service build for Phase 8 AutoTune (compile only AutoTune).
custom_size_profile = 1
build_flags =
    ${env.build_flags}
    -DENABLE_SERVICE_MENU=1
    -DENABLE_SERVICE_DRUM_TEST=0
    -DENABLE_SERVICE_HEATER_TEST=0
    -DENABLE_SERVICE_PID_VIEW=0
    -DENABLE_SERVICE_IO_TEST=0
    -DENABLE_SERVICE_FOPDT_ID=0
    -DENABLE_SERVICE_AUTOTUNE=1

; Upload settings
; Upload speed depends on Nano bootloader:
; - `board = nanoatmega328`    -> 57600  (Old Bootloader)
; - `board = nanoatmega328new` -> 115200 (New Bootloader)
; Leave `upload_speed` unset to use the board default (recommended).
; NOTE: Do not hardcode upload_port; set it locally if needed, e.g.:
; upload_port = COM5
; upload_port = /dev/ttyUSB0
